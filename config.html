<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produco - Settings</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Settings</h1>
            <nav>
                <a href="index.html">Dashboard</a>
                <a href="tasks.html">Tasks</a>
                <a href="timer.html">Timer</a>
            </nav>
        </header>
        
        <main>
            <div class="settings-section">
                <h2>Timer Settings</h2>
                <div class="setting-item">
                    <label for="work-duration">Work Duration (minutes)</label>
                    <input type="number" id="work-duration" value="25" min="1" max="120">
                </div>
                <div class="setting-item">
                    <label for="break-duration">Break Duration (minutes)</label>
                    <input type="number" id="break-duration" value="5" min="1" max="30">
                </div>
            </div>
            
            <div class="settings-section">
                <h2>Appearance</h2>
                <div class="setting-item">
                    <label for="theme">Theme</label>
                    <select id="theme">
                        <option value="dark" selected>Dark</option>
                        <option value="light">Light</option>
                    </select>
                </div>
            </div>
            
            <div class="settings-section">
                <h2>Data</h2>
                <div class="setting-item">
                    <button id="export-data" class="btn btn-secondary">Export Data</button>
                    <button id="import-data" class="btn btn-secondary">Import Data</button>
                    <button id="clear-data" class="btn btn-danger">Clear All Data</button>
                </div>
            </div>
            
            <div class="settings-actions">
                <button id="save-settings" class="btn btn-primary">Save Settings</button>
            </div>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
